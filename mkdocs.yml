site_name: brain-mri-segmentation
site_description: Production-grade binary brain-tumor MRI segmentation (LGG / TCGA).
repo_url: https://github.com/kiselyovd/brain-mri-segmentation
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Training: training.md
  - Serving: serving.md
  - Benchmarks: BENCHMARKS.md
  - Reproducibility: REPRODUCIBILITY.md
  - Limitations: LIMITATIONS.md
  - API reference: api.md
