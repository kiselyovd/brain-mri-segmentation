<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500">
  <defs>
    <radialGradient id="brain" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e6e6e6"/>
      <stop offset="40%" stop-color="#8a8a8a"/>
      <stop offset="75%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>
    <radialGradient id="tumor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#cfcfcf"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="panel-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .panel-title { font-family: Inter, sans-serif; font-size: 15px; font-weight: 700; fill: #1d3557; text-anchor: middle; }
      .panel-frame { fill: #0b1020; stroke: #1d3557; stroke-width: 1.5; }
      .subtitle { font-family: Inter, sans-serif; font-size: 14px; fill: #6b7280; text-anchor: middle; }
      .headline { font-family: Inter, sans-serif; font-size: 18px; font-weight: 700; fill: #1d3557; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1400" height="500" fill="white"/>

  <!-- Title -->
  <text x="700" y="38" class="headline">SegFormer-B2 · Dice 65.5% · IoU 66.2% · Pixel acc 99.73%</text>
  <text x="700" y="60" class="subtitle">Patient-level 80/10/10 split · 387 held-out test slices from 11 TCGA patients</text>

  <!-- PANEL 1: Input MRI slice -->
  <g transform="translate(80, 100)" filter="url(#panel-shadow)">
    <rect width="380" height="360" rx="12" class="panel-frame"/>
    <circle cx="190" cy="180" r="125" fill="url(#brain)"/>
    <!-- Inner brain details -->
    <ellipse cx="165" cy="155" rx="30" ry="22" fill="#2a2a2a" opacity="0.7"/>
    <ellipse cx="225" cy="165" rx="24" ry="20" fill="#2a2a2a" opacity="0.65"/>
    <!-- Tumor region (bright blob upper-left) -->
    <ellipse cx="140" cy="140" rx="36" ry="28" fill="url(#tumor)" filter="url(#soft)"/>
    <ellipse cx="140" cy="140" rx="22" ry="18" fill="#f8f8f8" opacity="0.85"/>
  </g>
  <text x="270" y="90" class="panel-title">Input · FLAIR MRI slice</text>

  <!-- PANEL 2: Ground truth mask overlay (green) -->
  <g transform="translate(510, 100)" filter="url(#panel-shadow)">
    <rect width="380" height="360" rx="12" class="panel-frame"/>
    <circle cx="190" cy="180" r="125" fill="url(#brain)"/>
    <ellipse cx="165" cy="155" rx="30" ry="22" fill="#2a2a2a" opacity="0.7"/>
    <ellipse cx="225" cy="165" rx="24" ry="20" fill="#2a2a2a" opacity="0.65"/>
    <ellipse cx="140" cy="140" rx="36" ry="28" fill="url(#tumor)" filter="url(#soft)"/>
    <!-- GT mask overlay in green -->
    <ellipse cx="140" cy="140" rx="34" ry="26" fill="#5fae70" opacity="0.55"/>
    <ellipse cx="140" cy="140" rx="34" ry="26" fill="none" stroke="#2d7a3c" stroke-width="2"/>
  </g>
  <text x="700" y="90" class="panel-title">Ground truth · annotator-drawn mask</text>

  <!-- PANEL 3: Model prediction (magenta) -->
  <g transform="translate(940, 100)" filter="url(#panel-shadow)">
    <rect width="380" height="360" rx="12" class="panel-frame"/>
    <circle cx="190" cy="180" r="125" fill="url(#brain)"/>
    <ellipse cx="165" cy="155" rx="30" ry="22" fill="#2a2a2a" opacity="0.7"/>
    <ellipse cx="225" cy="165" rx="24" ry="20" fill="#2a2a2a" opacity="0.65"/>
    <ellipse cx="140" cy="140" rx="36" ry="28" fill="url(#tumor)" filter="url(#soft)"/>
    <!-- Predicted mask overlay in magenta, slightly larger (simulating over-segmentation at edges) -->
    <ellipse cx="142" cy="141" rx="38" ry="30" fill="#dd5193" opacity="0.5"/>
    <ellipse cx="142" cy="141" rx="38" ry="30" fill="none" stroke="#a9206a" stroke-width="2"/>
  </g>
  <text x="1130" y="90" class="panel-title">Prediction · SegFormer-B2 output</text>

  <!-- Footer -->
  <text x="700" y="490" class="subtitle">Prediction slightly over-segments the tumor edge — a typical failure mode documented in docs/LIMITATIONS.md</text>
</svg>
