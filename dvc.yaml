stages:
  prepare:
    cmd: python -m brain_mri_segmentation.data.prepare --raw data/raw --out data/processed
    deps:
      - data/raw
      - src/brain_mri_segmentation/data/prepare.py
    outs:
      - data/processed
  train:
    cmd: python -m brain_mri_segmentation.training.train
    deps:
      - data/processed
      - src/brain_mri_segmentation
      - configs
    params:
      - params.yaml:
    outs:
      - artifacts/checkpoints
    metrics:
      - reports/metrics.json:
          cache: false
